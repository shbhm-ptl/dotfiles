onboarding = false
# herdr — agent multiplexer (https://herdr.dev)

[keys]
# ctrl+b matches the tmux prefix (one muscle memory for both). Note: when
# herdr runs INSIDE a tmux pane, tmux eats ctrl+b first — reach herdr with
# ctrl+b ctrl+b, or run herdr directly in the terminal (the usual setup).
prefix = "ctrl+b"

[theme]
# picked during herdr onboarding; "catppuccin" is also built in if you
# want it to match Ghostty / tmux / neovim again
name = "dracula"
auto_switch = false
