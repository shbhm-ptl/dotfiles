onboarding = false
# herdr — agent multiplexer (https://herdr.dev)

[keys]
# herdr's default prefix is ctrl+b, which collides with the tmux prefix.
# ctrl+a is free (tmux uses ctrl+b), so herdr gets ctrl+a when running
# inside a tmux pane.
prefix = "ctrl+a"

[theme]
# picked during herdr onboarding; "catppuccin" is also built in if you
# want it to match Ghostty / tmux / neovim again
name = "dracula"
auto_switch = false
